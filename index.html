<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأدلة الإرشادية لنظام Blackboard Ultra</title>
    
    <!-- استيراد خط تجوال -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- مكتبة لقراءة Google Sheets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #00767c;
            --primary-light: #e0f2f1;
            --primary-hover: #005f63;
            --blue: #0284c7;
            --blue-light: #e0f2fe;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius: 16px;
            --font-main: 'Tajawal', sans-serif;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0;
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 30px 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), #80cbc4);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
        }

        /* Tabs */
        .tabs-wrapper {
            background: var(--card-bg);
            padding: 8px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-family: var(--font-main);
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .tab-btn:hover:not(.active) {
            background: #f3f4f6;
        }

        /* Search */
        .search-container {
            position: relative;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--card-bg);
            font-family: var(--font-main);
            font-size: 15px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Guide Cards */
        .guides-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 200px; /* To avoid layout shift */
        }

        .guide-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .guide-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .guide-info { flex: 1; }

        .guide-category {
            font-size: 11px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 4px;
            display: block;
        }

        .guide-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }

        .guide-actions {
            display: flex;
            gap: 8px;
            margin-right: 15px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .action-btn.pdf { background: var(--blue-light); color: var(--blue); }
        .action-btn.pdf:hover { background: var(--blue); color: white; }

        .action-btn.video { background: var(--primary-light); color: var(--primary); }
        .action-btn.video:hover { background: var(--primary); color: white; }

        .empty-state, .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
            display: none;
        }
        
        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .guide-card { padding: 15px; }
            .action-btn { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="header">
            <h1>الأدلة الإرشادية لنظام Blackboard Ultra</h1>
        </header>

        <div class="tabs-wrapper">
            <button class="tab-btn active" onclick="switchTab('faculty')">عضو هيئة التدريس</button>
            <button class="tab-btn" onclick="switchTab('students')">المتعلم</button>
        </div>

        <div class="search-container">
            <div class="search-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن اسم الدليل..." onkeyup="filterGuides()">
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state" style="display: block;">
            <div class="loader"></div>
            جاري تحميل الأدلة...
        </div>

        <div id="guidesList" class="guides-list"></div>

        <div id="emptyState" class="empty-state">
            لا توجد نتائج مطابقة للبحث
        </div>

    </div>

    <script>
        // ==========================================
        //  إعدادات Google Sheet
        // ==========================================
        
        // ضع رابط الـ CSV الذي حصلت عليه من (Publish to web) هنا داخل علامات التنصيص
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQp8lz59GwDjwL6ZlRCNLmVU6QkmZ7ekX76Sz9ngwEKBcHxutRGtIRUAKoiZzXQTg/pub?output=csv"; 

        // ==========================================

        let guidesData = {
            faculty: [],
            students: []
        };
        let currentTab = 'faculty';

        // دالة لجلب البيانات عند فتح الصفحة
        function fetchGuides() {
            if(SHEET_URL === "https://docs.google.com/spreadsheets/d/e/2PACX-1vQp8lz59GwDjwL6ZlRCNLmVU6QkmZ7ekX76Sz9ngwEKBcHxutRGtIRUAKoiZzXQTg/pub?output=csv" || SHEET_URL === "") {
                alert("الرجاء وضع رابط Google Sheet CSV في الكود");
                return;
            }

            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    processData(results.data);
                },
                error: function(err) {
                    console.error("Error fetching data:", err);
                    document.getElementById('loadingState').textContent = "حدث خطأ في تحميل البيانات";
                }
            });
        }

        // دالة لمعالجة البيانات وتوزيعها
        function processData(data) {
            guidesData.faculty = [];
            guidesData.students = [];

            data.forEach(row => {
                // التأكد من أن الصف يحتوي على بيانات
                if (!row['عنوان الدليل']) return;

                const item = {
                    category: row['التصنيف'] || "عام",
                    title: row['عنوان الدليل'],
                    pdf: row['رابط PDF'] || "",
                    video: row['رابط الفيديو'] || ""
                };

                // توزيع البيانات حسب النوع
                const type = row['نوع الدليل'] ? row['نوع الدليل'].trim() : "";
                
                if (type.includes("هيئة تدريس")) {
                    guidesData.faculty.push(item);
                } else if (type.includes("المتعلم") || type.includes("طالب")) {
                    guidesData.students.push(item);
                }
            });

            // إخفاء التحميل وعرض البيانات
            document.getElementById('loadingState').style.display = 'none';
            renderGuides();
        }

        function renderGuides() {
            const container = document.getElementById('guidesList');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const emptyState = document.getElementById('emptyState');
            
            container.innerHTML = '';
            
            const data = guidesData[currentTab];
            let hasResults = false;

            if (data.length === 0) {
                emptyState.textContent = "لا توجد بيانات للعرض حالياً";
                emptyState.style.display = 'block';
                return;
            }

            data.forEach(item => {
                // البحث في العنوان أو التصنيف
                if (item.title.toLowerCase().includes(searchVal) || item.category.toLowerCase().includes(searchVal)) {
                    hasResults = true;
                    
                    const card = document.createElement('div');
                    card.className = 'guide-card';
                    
                    let linksHtml = '';
                    
                    if(item.pdf && item.pdf.trim() !== "") {
                        linksHtml += `
                            <a href="${item.pdf}" target="_blank" class="action-btn pdf" title="تحميل دليل PDF">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                            </a>`;
                    }
                    
                    if(item.video && item.video.trim() !== "") {
                        linksHtml += `
                            <a href="${item.video}" target="_blank" class="action-btn video" title="مشاهدة فيديو">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            </a>`;
                    }

                    card.innerHTML = `
                        <div class="guide-info">
                            <span class="guide-category">${item.category}</span>
                            <h3 class="guide-title">${item.title}</h3>
                        </div>
                        <div class="guide-actions">
                            ${linksHtml}
                        </div>
                    `;
                    
                    container.appendChild(card);
                }
            });

            emptyState.textContent = "لا توجد نتائج مطابقة للبحث";
            emptyState.style.display = hasResults ? 'none' : 'block';
        }

        function switchTab(type) {
            currentTab = type;
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('searchInput').value = '';
            renderGuides();
        }

        function filterGuides() {
            renderGuides();
        }

        // تشغيل عند التحميل
        document.addEventListener('DOMContentLoaded', () => {
            fetchGuides();
        });

    </script>
</body>
</html>
